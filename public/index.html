<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Pipeline</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
<style>
:root {
  --bg: #0d0d0d;
  --surface: #141414;
  --card: #1a1a1a;
  --border: #252525;
  --border-bright: #333;
  --qwen: #a78bfa;
  --gemini: #34d399;
  --user: #60a5fa;
  --text: #e2e2e2;
  --muted: #555;
  --muted2: #777;
  --error: #f87171;
  --warning: #fbbf24;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Pretendard', sans-serif;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

header {
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  background: var(--surface);
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 1px;
}

.logo-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--gemini);
  box-shadow: 0 0 8px var(--gemini);
}

.pipeline-badges {
  display: flex;
  gap: 8px;
  align-items: center;
}

.badge {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  padding: 3px 8px;
  border-radius: 4px;
  letter-spacing: 0.5px;
}

.badge-qwen {
  background: rgba(167,139,250,0.1);
  border: 1px solid rgba(167,139,250,0.3);
  color: var(--qwen);
}

.badge-gemini {
  background: rgba(52,211,153,0.1);
  border: 1px solid rgba(52,211,153,0.3);
  color: var(--gemini);
}

.badge-arrow { color: var(--muted); font-size: 12px; }

.clear-btn {
  background: none;
  border: 1px solid var(--border-bright);
  color: var(--muted2);
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  padding: 5px 10px;
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.15s;
}
.clear-btn:hover { border-color: var(--error); color: var(--error); }

#chat {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 20px;
  scroll-behavior: smooth;
}
#chat::-webkit-scrollbar { width: 4px; }
#chat::-webkit-scrollbar-track { background: transparent; }
#chat::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 2px; }

.msg-wrap {
  display: flex;
  flex-direction: column;
  gap: 4px;
  animation: fadeUp 0.2s ease;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.msg-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 0 4px;
}

.label-user { color: var(--user); }
.label-qwen { color: var(--qwen); }
.label-gemini { color: var(--gemini); }
.label-system { color: var(--muted2); }

.msg-bubble {
  padding: 14px 16px;
  border-radius: 8px;
  line-height: 1.7;
  font-size: 14px;
}

.bubble-user {
  background: rgba(96,165,250,0.06);
  border: 1px solid rgba(96,165,250,0.15);
  align-self: flex-end;
  max-width: 80%;
  white-space: pre-wrap;
}

.bubble-qwen {
  background: rgba(167,139,250,0.05);
  border: 1px solid rgba(167,139,250,0.15);
  border-left: 3px solid var(--qwen);
}

.bubble-gemini {
  background: rgba(52,211,153,0.05);
  border: 1px solid rgba(52,211,153,0.15);
  border-left: 3px solid var(--gemini);
}

.bubble-system {
  background: rgba(251,191,36,0.05);
  border: 1px solid rgba(251,191,36,0.15);
  color: var(--warning);
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
}

.bubble-error {
  background: rgba(248,113,113,0.05);
  border: 1px solid rgba(248,113,113,0.2);
  color: var(--error);
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
}

.msg-bubble h1, .msg-bubble h2, .msg-bubble h3 {
  font-family: 'JetBrains Mono', monospace;
  margin: 12px 0 6px;
  color: var(--text);
}
.msg-bubble h1 { font-size: 16px; }
.msg-bubble h2 { font-size: 14px; }
.msg-bubble h3 { font-size: 13px; color: var(--muted2); }
.msg-bubble p { margin: 6px 0; }
.msg-bubble ul, .msg-bubble ol { padding-left: 20px; margin: 6px 0; }
.msg-bubble li { margin: 3px 0; }
.msg-bubble code {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  background: rgba(255,255,255,0.06);
  padding: 1px 5px;
  border-radius: 3px;
  color: #e2b97a;
}
.msg-bubble pre {
  margin: 10px 0;
  border-radius: 6px;
  overflow: hidden;
  border: 1px solid var(--border-bright);
}
.msg-bubble pre code { background: none; padding: 0; color: inherit; font-size: 12px; }
.msg-bubble strong { color: #fff; font-weight: 600; }
.msg-bubble em { color: var(--muted2); }

.pipeline-status {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 14px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
}

.stage-item {
  display: flex;
  align-items: center;
  gap: 6px;
  color: var(--muted);
  transition: color 0.3s;
}
.stage-item.active { color: var(--warning); }
.stage-item.done-qwen { color: var(--qwen); }
.stage-item.done-gemini { color: var(--gemini); }
.stage-item.failed { color: var(--error); }

.stage-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: currentColor;
}
.stage-item.active .stage-dot { animation: pulseDot 1s infinite; }

@keyframes pulseDot {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.4; transform: scale(0.7); }
}

.stage-divider { color: var(--border-bright); font-size: 10px; }

.token-info {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  padding: 0 4px;
  display: flex;
  gap: 12px;
}
.token-val { color: var(--muted2); }

.input-area {
  border-top: 1px solid var(--border);
  padding: 16px 20px;
  background: var(--surface);
  flex-shrink: 0;
}

.input-wrap {
  display: flex;
  gap: 10px;
  align-items: flex-end;
  max-width: 900px;
  margin: 0 auto;
}

textarea {
  flex: 1;
  background: var(--card);
  border: 1px solid var(--border-bright);
  border-radius: 8px;
  color: var(--text);
  font-family: 'Pretendard', sans-serif;
  font-size: 14px;
  line-height: 1.6;
  padding: 12px 14px;
  resize: none;
  outline: none;
  min-height: 48px;
  max-height: 160px;
  transition: border-color 0.2s;
  overflow-y: auto;
}
textarea:focus { border-color: rgba(167,139,250,0.4); }
textarea::placeholder { color: var(--muted); }

.send-btn {
  background: linear-gradient(135deg, var(--qwen), var(--gemini));
  border: none;
  border-radius: 8px;
  color: #000;
  font-family: 'JetBrains Mono', monospace;
  font-weight: 700;
  font-size: 13px;
  padding: 12px 18px;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
  height: 48px;
}
.send-btn:hover { filter: brightness(1.1); transform: translateY(-1px); }
.send-btn:active { transform: translateY(0); }
.send-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

.input-hint {
  text-align: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  margin-top: 8px;
  letter-spacing: 0.5px;
}

.welcome {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  color: var(--muted);
  text-align: center;
  padding: 40px;
}
.welcome-title {
  font-family: 'JetBrains Mono', monospace;
  font-size: 20px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: 2px;
}
.welcome-sub { font-size: 13px; line-height: 1.8; max-width: 400px; }
.welcome-flow {
  display: flex;
  align-items: center;
  gap: 10px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  padding: 12px 20px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  margin-top: 8px;
}
.flow-step { display: flex; align-items: center; gap: 6px; }
.flow-qwen { color: var(--qwen); }
.flow-gemini { color: var(--gemini); }
.flow-arrow { color: var(--muted); }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-dot"></div>
    AI PIPELINE
  </div>
  <div class="pipeline-badges">
    <span class="badge badge-qwen">Qwen3.6 CoT</span>
    <span class="badge-arrow">→</span>
    <span class="badge badge-gemini">Gemini 2.5 Flash CoT</span>
  </div>
  <button class="clear-btn" onclick="clearChat()">대화 초기화</button>
</header>

<div id="chat">
  <div class="welcome" id="welcome">
    <div class="welcome-title">DUAL CoT PIPELINE</div>
    <div class="welcome-sub">
      Qwen3.6이 초안을 작성하고<br>
      Gemini 2.5 Flash가 검토/보완합니다.<br>
      두 모델 모두 강화된 CoT 프롬프트 적용.
    </div>
    <div class="welcome-flow">
      <div class="flow-step flow-qwen"><span>●</span> Qwen3.6 초안</div>
      <span class="flow-arrow">──▶</span>
      <div class="flow-step flow-gemini"><span>●</span> Gemini 검토</div>
      <span class="flow-arrow">──▶</span>
      <div class="flow-step" style="color:var(--text)">최종 출력</div>
    </div>
  </div>
</div>

<div class="input-area">
  <div class="input-wrap">
    <textarea
      id="input"
      placeholder="질문이나 코딩 작업을 입력하세요... (Shift+Enter: 줄바꿈, Enter: 전송)"
      rows="1"
    ></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">전송</button>
  </div>
  <div class="input-hint">Qwen CoT → Gemini CoT 파이프라인 · 무료 · 한국어 기본</div>
</div>

<script>
marked.setOptions({ breaks: true, gfm: true });

let conversationHistory = [];
let isLoading = false;

const chatEl = document.getElementById('chat');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');
const welcomeEl = document.getElementById('welcome');

inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + 'px';
});

inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    if (!isLoading) sendMessage();
  }
});

function scrollToBottom() { chatEl.scrollTop = chatEl.scrollHeight; }
function hideWelcome() { if (welcomeEl) welcomeEl.style.display = 'none'; }

function addUserMessage(text) {
  hideWelcome();
  const wrap = document.createElement('div');
  wrap.className = 'msg-wrap';
  wrap.style.alignItems = 'flex-end';
  wrap.innerHTML = `
    <div class="msg-label label-user">YOU</div>
    <div class="msg-bubble bubble-user">${escapeHtml(text)}</div>
  `;
  chatEl.appendChild(wrap);
  scrollToBottom();
}

function addPipelineStatus() {
  const wrap = document.createElement('div');
  wrap.className = 'msg-wrap';
  wrap.id = 'pipeline-status';
  wrap.innerHTML = `
    <div class="pipeline-status">
      <div class="stage-item" id="stage-qwen">
        <div class="stage-dot"></div>
        Qwen3.6 CoT
      </div>
      <span class="stage-divider">▶</span>
      <div class="stage-item" id="stage-gemini">
        <div class="stage-dot"></div>
        Gemini CoT
      </div>
      <span class="stage-divider">▶</span>
      <div class="stage-item" id="stage-final">
        <div class="stage-dot"></div>
        최종 출력
      </div>
    </div>
  `;
  chatEl.appendChild(wrap);
  scrollToBottom();
  return wrap;
}

function updateStage(stage) {
  const qwen  = document.getElementById('stage-qwen');
  const gemini = document.getElementById('stage-gemini');
  const final = document.getElementById('stage-final');
  if (!qwen) return;

  if (stage === 'qwen_start') {
    qwen.classList.add('active');

  } else if (stage === 'qwen_done') {
    qwen.classList.remove('active');
    qwen.classList.add('done-qwen');
    gemini.classList.add('active');

  // ✅ 추가: Qwen 실패 → 빨간색 표시 후 Gemini 단독으로 넘어감
  } else if (stage === 'qwen_failed') {
    qwen.classList.remove('active');
    qwen.classList.add('failed');
    qwen.querySelector('.stage-dot').title = 'Qwen 모델 불가';
    gemini.classList.add('active');

  } else if (stage === 'gemini_start') {
    gemini.classList.add('active');

  } else if (stage === 'done') {
    gemini.classList.remove('active');
    gemini.classList.add('done-gemini');
    final.classList.add('done-gemini');
  }
}

function addQwenDraft(content) {
  const wrap = document.createElement('div');
  wrap.className = 'msg-wrap';
  wrap.id = 'qwen-draft';
  wrap.innerHTML = `
    <div class="msg-label label-qwen">QWEN 3.6 — 초안</div>
    <div class="msg-bubble bubble-qwen">${renderMarkdown(content)}</div>
  `;
  chatEl.appendChild(wrap);
  scrollToBottom();
  hljs.highlightAll();
}

// ✅ 수정: solo_mode 여부에 따라 라벨/토큰 표시 다르게
function addFinalAnswer(content, tokens, soloMode) {
  const label = soloMode
    ? 'GEMINI 2.5 FLASH — 단독 답변 (Qwen 불가)'
    : 'GEMINI 2.5 FLASH — 최종 검토';

  let tokenHtml = '';
  if (tokens && !soloMode) {
    tokenHtml = `
      <div class="token-info">
        <span>추정 입력 토큰: <span class="token-val">${tokens.estimated_input.toLocaleString()}</span></span>
        <span>파이프라인 토큰: <span class="token-val">${tokens.estimated_pipeline.toLocaleString()}</span></span>
        <span style="color:var(--gemini)">비용: $0</span>
      </div>
    `;
  } else if (tokens && soloMode) {
    tokenHtml = `
      <div class="token-info">
        <span>추정 입력 토큰: <span class="token-val">${tokens.estimated_input.toLocaleString()}</span></span>
        <span style="color:var(--warning)">Gemini 단독 모드</span>
        <span style="color:var(--gemini)">비용: $0</span>
      </div>
    `;
  }

  const wrap = document.createElement('div');
  wrap.className = 'msg-wrap';
  wrap.innerHTML = `
    <div class="msg-label label-gemini">${label}</div>
    <div class="msg-bubble bubble-gemini">${renderMarkdown(content)}</div>
    ${tokenHtml}
  `;
  chatEl.appendChild(wrap);
  scrollToBottom();
  hljs.highlightAll();
}

function addSystemMessage(text, type = 'system') {
  const wrap = document.createElement('div');
  wrap.className = 'msg-wrap';
  wrap.innerHTML = `<div class="msg-bubble bubble-${type}">${escapeHtml(text)}</div>`;
  chatEl.appendChild(wrap);
  scrollToBottom();
}

function renderMarkdown(text) { return marked.parse(text || ''); }

function escapeHtml(text) {
  return text
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/\n/g, '<br>');
}

async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text || isLoading) return;

  isLoading = true;
  sendBtn.disabled = true;
  inputEl.value = '';
  inputEl.style.height = 'auto';

  addUserMessage(text);
  conversationHistory.push({ role: 'user', content: text });

  const statusEl = addPipelineStatus();

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: conversationHistory })
    });

    if (!res.ok) {
      const err = await res.json();
      statusEl.remove();
      addSystemMessage(err.error || '서버 오류', 'error');
      isLoading = false;
      sendBtn.disabled = false;
      return;
    }

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    let finalContent = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const raw = line.slice(6).trim();
        if (raw === '[DONE]') break;

        try {
          const event = JSON.parse(raw);

          if (event.stage === 'qwen_start' || event.stage === 'gemini_start') {
            updateStage(event.stage);

          } else if (event.stage === 'qwen_done') {
            updateStage('qwen_done');
            addQwenDraft(event.draft);

          // ✅ 추가: Qwen 실패 이벤트 처리
          } else if (event.stage === 'qwen_failed') {
            updateStage('qwen_failed');
            addSystemMessage(event.message);

          } else if (event.stage === 'pipeline_limit') {
            updateStage('done');
            addSystemMessage(event.message);
            addFinalAnswer(event.final, null, false);
            finalContent = event.final;

          } else if (event.stage === 'done') {
            updateStage('done');
            // ✅ 수정: solo_mode 플래그 전달
            addFinalAnswer(event.final, event.tokens, event.solo_mode || false);
            finalContent = event.final;

          } else if (event.stage === 'error') {
            addSystemMessage(event.error, 'error');
          }
        } catch (e) { /* JSON 파싱 에러 무시 */ }
      }
    }

    statusEl.remove();
    if (finalContent) {
      conversationHistory.push({ role: 'assistant', content: finalContent });
    }

  } catch (err) {
    statusEl.remove();
    addSystemMessage(`네트워크 오류: ${err.message}`, 'error');
  }

  isLoading = false;
  sendBtn.disabled = false;
  inputEl.focus();
}

function clearChat() {
  conversationHistory = [];
  chatEl.innerHTML = '';
  const welcome = document.createElement('div');
  welcome.className = 'welcome';
  welcome.id = 'welcome';
  welcome.innerHTML = `
    <div class="welcome-title">DUAL CoT PIPELINE</div>
    <div class="welcome-sub">
      Qwen3.6이 초안을 작성하고<br>
      Gemini 2.5 Flash가 검토/보완합니다.<br>
      두 모델 모두 강화된 CoT 프롬프트 적용.
    </div>
    <div class="welcome-flow">
      <div class="flow-step flow-qwen"><span>●</span> Qwen3.6 초안</div>
      <span class="flow-arrow">──▶</span>
      <div class="flow-step flow-gemini"><span>●</span> Gemini 검토</div>
      <span class="flow-arrow">──▶</span>
      <div class="flow-step" style="color:var(--text)">최종 출력</div>
    </div>
  `;
  chatEl.appendChild(welcome);
}
</script>
</body>
</html>
