<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>AI Pipeline Streaming</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <style>
        body { background: #0d0d0d; color: #e2e2e2; font-family: sans-serif; padding: 20px; }
        #chat { max-width: 900px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }
        .msg { padding: 15px; border-radius: 8px; border: 1px solid #333; line-height: 1.6; }
        .user { border-color: #60a5fa; align-self: flex-end; background: #1e293b; }
        .ai { border-color: #34d399; background: #064e3b1a; border-left: 4px solid #34d399; }
        pre { background: #1a1a1a; padding: 10px; border-radius: 5px; overflow-x: auto; }
        code { font-family: monospace; }
        .input-area { position: fixed; bottom: 0; left: 0; width: 100%; padding: 20px; background: #141414; border-top: 1px solid #333; }
        .wrap { max-width: 900px; margin: 0 auto; display: flex; gap: 10px; }
        textarea { flex: 1; background: #1a1a1a; color: white; border: 1px solid #444; padding: 10px; border-radius: 5px; }
        button { padding: 10px 20px; background: #34d399; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div id="chat"></div>

<div class="input-area">
    <div class="wrap">
        <textarea id="input" placeholder="명령어를 입력하세요..."></textarea>
        <button id="sendBtn" onclick="sendMessage()">전송</button>
    </div>
</div>

<script>
let history = [];

async function sendMessage() {
    const input = document.getElementById('input');
    const text = input.value.trim();
    if(!text) return;
    input.value = '';

    const chat = document.getElementById('chat');
    chat.innerHTML += `<div class="msg user">${text}</div>`;

    // 스트리밍용 컨테이너 생성
    const aiMsgDiv = document.createElement('div');
    aiMsgDiv.className = 'msg ai';
    aiMsgDiv.innerHTML = '<i>생성 중...</i>';
    chat.appendChild(aiMsgDiv);

    let currentText = "";

    try {
        const res = await fetch('/api/chat', {
            method: 'POST',
            body: JSON.stringify({ messages: [...history, {role:'user', content: text}] })
        });

        const reader = res.body.getReader();
        const decoder = new TextDecoder();

        while (true) {
            const { done, value } = await reader.read();
            if (done) break;

            const chunk = decoder.decode(value);
            const lines = chunk.split('\n');
            
            for (const line of lines) {
                if (!line.startsWith('data: ')) continue;
                const data = JSON.parse(line.slice(6));

                if (data.stage === 'streaming') {
                    currentText += data.chunk;
                    aiMsgDiv.innerHTML = marked.parse(currentText);
                    hljs.highlightAll();
                }
                if (data.stage === 'done') {
                    history.push({role:'user', content: text});
                    history.push({role:'assistant', content: data.final});
                }
            }
            window.scrollTo(0, document.body.scrollHeight);
        }
    } catch (e) {
        aiMsgDiv.innerHTML = "에러 발생: " + e.message;
    }
}
</script>
</body>
</html>
