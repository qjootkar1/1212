<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise AI Architect | System Design Pro</title>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark-dimmed.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    
    <style>
        /* [Design System] */
        :root {
            --bg-deep: #050505;
            --bg-surface: #111113;
            --accent: #10b981;
            --accent-soft: rgba(16, 185, 129, 0.15);
            --border: #27272a;
            --text-primary: #f4f4f5;
            --text-secondary: #a1a1aa;
            --user-bubble: #1e1e20;
            --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* [Layout] */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: var(--bg-deep); 
            color: var(--text-primary);
            font-family: -apple-system, 'Pretendard', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* [Custom Scrollbar] */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }

        /* [Header] */
        header {
            padding: 1rem 2rem;
            background: rgba(5, 5, 5, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }
        .brand { font-size: 1.2rem; font-weight: 800; color: var(--accent); display: flex; align-items: center; gap: 10px; }
        .system-status { display: flex; align-items: center; gap: 8px; font-size: 0.8rem; color: var(--text-secondary); }
        .pulse { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); } 100% { box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); } }

        /* [Main Chat Area] */
        #chat-scroller {
            flex: 1;
            overflow-y: auto;
            padding: 2rem 0;
            display: flex;
            flex-direction: column;
        }
        .container {
            width: 90%;
            max-width: 1000px;
            margin: 0 auto;
        }

        .message-block { margin-bottom: 3rem; animation: slideIn 0.5s ease; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .meta { font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-secondary); margin-bottom: 0.8rem; display: flex; align-items: center; gap: 10px; }
        .meta::after { content: ''; flex: 1; height: 1px; background: var(--border); }

        .content { 
            padding: 1.5rem; 
            border-radius: 12px; 
            line-height: 1.8; 
            font-size: 0.95rem; 
        }
        .ai-node { background: var(--bg-surface); border: 1px solid var(--border); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .user-node { background: var(--user-bubble); border: 1px solid var(--border); margin-left: 10%; }

        /* [Code Rendering] */
        pre { 
            background: #000 !important; 
            padding: 1.5rem; 
            border-radius: 8px; 
            margin: 1.5rem 0; 
            border: 1px solid var(--border);
            overflow-x: auto;
            position: relative;
        }
        pre::before {
            content: 'SOURCE CODE';
            position: absolute; top: 0; right: 2rem;
            font-size: 0.6rem; color: var(--accent); padding: 4px 8px;
            background: var(--accent-soft); border-radius: 0 0 4px 4px;
        }
        code { font-family: var(--font-mono); font-size: 0.85rem; }

        /* [Input Section] */
        .input-panel {
            padding: 2rem;
            background: linear-gradient(to top, var(--bg-deep), transparent);
            border-top: 1px solid var(--border);
        }
        .input-box {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 10px;
            transition: var(--transition);
        }
        .input-box:focus-within { border-color: var(--accent); box-shadow: 0 0 20px var(--accent-soft); }
        
        textarea {
            width: 100%;
            height: 80px;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 1rem;
            resize: none;
            outline: none;
            padding: 0.5rem;
        }
        .actions { display: flex; justify-content: flex-end; align-items: center; gap: 15px; }
        .token-count { font-size: 0.7rem; color: var(--text-secondary); }
        
        button {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
        }
        button:hover { transform: translateY(-2px); filter: brightness(1.1); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        /* [Markdown Enhancements] */
        h1, h2, h3 { color: var(--accent); margin: 1.5rem 0 1rem; }
        ul, ol { padding-left: 1.5rem; margin-bottom: 1rem; }
        blockquote { border-left: 4px solid var(--accent); padding-left: 1rem; color: var(--text-secondary); font-style: italic; }
    </style>
</head>
<body>

<header>
    <div class="brand">PRO ARCHITECT <small style="font-size: 0.6rem; opacity: 0.5;">v2.5.4</small></div>
    <div class="system-status">
        <div class="pulse"></div>
        <span>GEMINI-2.0-FLASH-STREAMING</span>
    </div>
</header>

<div id="chat-scroller">
    <div class="container" id="chat-anchor">
        </div>
</div>

<div class="input-panel">
    <div class="container">
        <div class="input-box">
            <textarea id="prompt" placeholder="설계하고자 하는 고성능 시스템의 요구사항을 상세히 입력하세요..."></textarea>
            <div class="actions">
                <span class="token-count">Streaming: Ready</span>
                <button id="send-btn">EXECUTE</button>
            </div>
        </div>
    </div>
</div>

<script>
    // Configuration
    marked.setOptions({
        highlight: function(code, lang) {
            return hljs.highlightAuto(code).value;
        },
        breaks: true
    });

    const scroller = document.getElementById('chat-scroller');
    const anchor = document.getElementById('chat-anchor');
    const input = document.getElementById('prompt');
    const btn = document.getElementById('send-btn');

    async function streamResponse() {
        const query = input.value.trim();
        if (!query) return;

        // Reset UI
        input.value = '';
        btn.disabled = true;

        // User Message Injection
        anchor.innerHTML += `
            <div class="message-block">
                <div class="meta">USER REQUEST</div>
                <div class="content user-node">${query.replace(/\n/g, '<br>')}</div>
            </div>
        `;

        // AI Message Shell
        const aiBlock = document.createElement('div');
        aiBlock.className = 'message-block';
        aiBlock.innerHTML = `
            <div class="meta">AI ARCHITECT RESPONSE</div>
            <div class="content ai-node" id="streaming-target">
                <span style="color: var(--accent);">입력을 분석하고 최적화된 아키텍처를 설계 중입니다...</span>
            </div>
        `;
        anchor.appendChild(aiBlock);
        const target = document.getElementById('streaming-target');

        try {
            const response = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ messages: [{ role: 'user', content: query }] })
            });

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let accumulated = "";

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;

                const chunk = decoder.decode(value);
                // Gemini SSE Stream Parsing (Regex optimized)
                const matches = chunk.matchAll(/"text":\s*"(.*?)"/g);
                for (const match of matches) {
                    let text = match[1]
                        .replace(/\\n/g, '\n')
                        .replace(/\\"/g, '"')
                        .replace(/\\\\/g, '\\');
                    accumulated += text;
                }

                // Render Markdown & Code Highlight
                target.innerHTML = marked.parse(accumulated);
                target.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));
                
                // Auto-scroll logic
                scroller.scrollTop = scroller.scrollHeight;
            }
        } catch (err) {
            target.innerHTML = `<div style="color: #ef4444;">CRITICAL ERROR: ${err.message}</div>`;
        } finally {
            btn.disabled = false;
            target.removeAttribute('id');
        }
    }

    btn.addEventListener('click', streamResponse);
    input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            streamResponse();
        }
    });
</script>

</body>
</html>
